{% extends "items\base.html" %}
{% block content %}

<div style="width: 500px; margin-left: 50px;">
    <h2> Here is you todo list</h2>
    <br>
    <div class="list-group">
        <button type="button" class="list-group-item list-group-item-action active">
            Title
        </button>
        {% for todo in todo_obj %}
        <button type="button" class="list-group-item list-group-item-action">{{ todo.title }}</button>
        {% endfor %}
        <br>
        <a href="{% url 'add_todo' %}" class="btn btn-primary btn-lg active" role="button" aria-pressed="true">Add</a>
    </div>
</div>
{% endblock %}
