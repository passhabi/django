<html>

<head>
    <title>codedamn HTML Playground</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--- Link to flexbox.css---->
    <link rel="stylesheet" href="css/flexbox.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

</head>

<body>
    {% if user.is_authenticated %}
    <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <!-- login -->
        <a style="font-weight: bold;">Logged in as {{ user.username }}</a>
        <button type="submit">Sign Out</button>
        <!-- links -->
        &nbsp;<a href="{% url 'homepage' %}">Home Page</a>&nbsp; | &nbsp;
        <a href="{% url 'todolist' %}">Todolist</a>&nbsp;
    </form>
    {% else %}
    <a href="{% url 'signupin' %}">Sign Up / Sing In</a>
    {% endif %}

    <div style="margin-left: 50px;">
        {% block content %}

        {% endblock %}
    </div>

    <div class="parent">
        <div class="child1"></div>
        <div class="child2"></div>
    </div>
    <script src="https://bit.ly/codedamn-web-console"></script>
    <script src="/script.js"></script>
</body>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>

</html>
