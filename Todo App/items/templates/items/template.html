<header class="p-3 mb-3 border-bottom">
    {% load static %}
    <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
            <a href="/" class="d-flex align-items-center mb-2 mb-lg-0 link-body-emphasis text-decoration-none">
                <img class="bi me-2" width="32" height="32" role="img" aria-label="I Do"
                     src="{% static 'logo-tick.png' %}"></img></a>
            <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0">
                <li><a href="/" class="nav-link px-2 link-body-emphasis">IDo</a></li>
                <!-- <li><a href="/" class="nav-link px-2 link-secondary">IDo</a></li> -->
                {% if user.is_authenticated %}
                    <li><a href="{% url 'add_todo' %}" class="nav-link px-2 link-body-emphasis">Create</a></li>
                    <li><a href="{% url 'todolist' %}" class="nav-link px-2 link-body-emphasis">Todos</a></li>
                    <li><a href="{% url 'complete' %}" class="nav-link px-2 link-body-emphasis">Completed</a></li>
                {% endif %}
            </ul>
            {% block login %}{% endblock %}{% if user.is_authenticated %}
                <form class="col-12 col-lg-auto mb-3 mb-lg-0 me-lg-3" role="search">
                    <input type="search" class="form-control" placeholder="Search..." aria-label="Search">
                </form>
                <div class="dropdown text-end">
                    <a href="#" class="d-block link-body-emphasis text-decoration-none dropdown-toggle"
                       data-bs-toggle="dropdown" aria-expanded="false">
                        <img src="https://github.com/mdo.png" alt="mdo" width="32" height="32" class="rounded-circle">
                    </a>
                    <ul class="dropdown-menu text-small">
                        <li><a class="dropdown-item" href="{% url 'profile' %}">Profile</a></li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <form action="{% url 'logout' %}" method="post" style="margin: 0;">
                            {% csrf_token %}
                            <li>
                                <button type="submit" class="dropdown-item">Sign out</button>
                            </li>
                        </form>
                    </ul>
                </div>
            {% else %}
                <div class="text-end">
                    <a href="{% url 'signupin' %}" role="button" class="btn btn-light me-2">Login</a>
                    <a href="{% url 'signupin' %}" role="button" class="btn btn-warning">Sign-up</a>
                </div>
            {% endif %}
        </div>
    </div>
</header>

<body>
{% block content %}{% endblock %}

<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.5/umd/popper.js"/>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
        integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
        crossorigin="anonymous"></script>

        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>
</html>
