{% extends 'base.html' %}

{% csrf_token %}
{% block content %}
  <style>
    .center {
      padding: 3% 1% 0% 1%;
      width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>

  <div class="center">
    <form class="container">
      <div class="mb-3">
        <label for="titleInput" class="form-label">Title</label>
        <input type="input" name="title" class="form-control" id="titleInput" placeholder="e.g. Buy some cheese" />
      </div>

      <div class="mb-3">
        <label for="priorityRadio" class="form-label">Priority</label>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="priorityRadio" id="inlineRadio1" value="option1" />
          <label class="form-check-label" for="inlineRadio1">!</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="priorityRadio" id="inlineRadio2" value="option2" />
          <label class="form-check-label" for="inlineRadio2">!!</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="priorityRadio" id="inlineRadio3" value="option3" />
          <label class="form-check-label" for="inlineRadio3">!!!</label>
        </div>
        <div class="form-check form-check-inline">
          <input class="form-check-input" type="radio" name="priorityRadio" id="inlineRadio3" value="option3" />
          <label class="form-check-label" for="inlineRadio3">!!!!</label>
        </div>
      </div>

      <div class="mb-3">
        <label for="descriptionsInput" class="form-label">Description</label>
        <textarea type="input" name="description" class="form-control" id="descriptionsInput" aria-describedby="detailsHelp" rows="5"></textarea>
        <div id="detailsHelp" class="form-text">Either details or steps that are required to complete the action.</div>
      </div>
      <div class="row">
        <div class="col-sm">
          <div class="mb-3">
            <label for="descriptionsInput" class="form-label">Due date</label>
            <div class="form-date">
              <input type="datetime-local" class="form-control" id="descriptionsInput" aria-describedby="detailsHelp" />
            </div>
          </div>
        </div>

        <div class="col-sm">
          <div class="mb-3">
            <label class="my-1 mr-2" for="inlineFormCustomSelectPref">Category</label>
            <select class="form-select" id="inlineFormCustomSelectPref">
              <option selected>...</option>
              <option value="1">One</option>
              <option value="2">Two</option>
              <option value="3">Three</option>
            </select>
          </div>
        </div>
      </div>
      <div style="margin: 20px auto 0 auto; width: 430px;">
      <button type="submit" style="width: 435px;" class="btn btn-primary btn-lg btn-block">Add</button>
      </div>
    </form>
  </div>
{% endblock %}
